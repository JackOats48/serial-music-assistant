<script>
document.addEventListener('DOMContentLoaded', function() {
    let isSequencerPlaying = false;
    let currentStepIndex = 0;
    let sequencerTimer = null;
    let audioCtx = null;

    // --- Rotary Dials Mouse Drag Logic ---
    document.querySelectorAll('.dial-container').forEach(container => {
        const slider = container.querySelector('.slider-fallback');
        if (!slider) return;

        container.addEventListener('mousedown', function(e) {
        if (e.target.classList.contains('slider-fallback')) {
            return;
        }
            let startY = e.clientY;
            let startValue = parseInt(slider.value) || 0;
            document.body.style.cursor = 'ns-resize';
            e.preventDefault();

            function onMouseMove(moveEvent) {
                const deltaY = startY - moveEvent.clientY;
                const sensitivity = 2;
                const valueChange = Math.round(deltaY / sensitivity);

                const min = parseInt(slider.min) || 0;
                const max = parseInt(slider.max) || 100;
                let newValue = startValue + valueChange;

                if (newValue < min) newValue = min;
                if (newValue > max) newValue = max;

                slider.value = newValue;
                slider.dispatchEvent(new Event('input'));
            }

            function onMouseUp() {
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
                document.body.style.cursor = 'default';
            }

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        });
    });

    // --- Audio Initialisation Logic ---
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // --- Play Individual Note Oscillator Logic ---
    function playNote(midiOffset, duration, velocity, volume) {
        initAudio();
        if (!audioCtx) return;

        let baseFreq = 261.63;

        const keySel = document.getElementById('key-select').value;
        let keyOffset = 0;
        const keyOffsets = {
            'C-maj': 0, 'G-maj': 7, 'D-maj': 2, 'A-maj': 9, 'E-maj': 4, 'B-maj': 11,
            'Fsh-maj': 6, 'Csh-maj': 1, 'F-maj': 5, 'Bb-maj': 10, 'Eb-maj': 3, 'Ab-maj': 8,
            'Db-maj': 1, 'Gb-maj': 6, 'Cb-maj': 11
        };
        if (keyOffsets[keySel] !== undefined) {
            keyOffset = keyOffsets[keySel];
        }

        const octaveMultiplier = parseInt(document.getElementById('octave-select').value) || 1;
        const randomOctaveShift = Math.floor(Math.random() * octaveMultiplier) * 12;
        let runningOffset = (midiOffset % 12) + randomOctaveShift;

        let freq = baseFreq * Math.pow(2, (runningOffset + keyOffset) / 12);
        let osc = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();

        const voiceSel = document.getElementById('voice-select').value;
        if (voiceSel === 'piano' || voiceSel === 'sine') {
            osc.type = 'sine';
        } else if (voiceSel === 'triangle') {
            osc.type = 'triangle';
        } else if (voiceSel === 'sawtooth') {
            osc.type = 'sawtooth';
        }

        osc.frequency.value = freq;
if (velocity === 0) {
    return;
}
        let targetGain = (velocity / 127) * (volume / 100) * 0.15;

        gainNode.gain.setValueAtTime(targetGain, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration - 0.02);

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- Update Graphic Pointer Rotation ---
    function updateDialGraphic(sliderId, pointerId, minDeg, maxDeg, minVal, maxVal) {
        const slider = document.getElementById(sliderId);
        const pointer = document.getElementById(pointerId);
        if (!slider || !pointer) return;
        const fraction = (parseFloat(slider.value) - minVal) / (maxVal - minVal);
        const currentDegrees = minDeg + (fraction * (maxDeg - minDeg));
        pointer.style.transform = `rotate(${currentDegrees}deg)`;
    }

    // --- Dial Slider Input Listeners ---
    const volSlider = document.getElementById('vol-slider');
    volSlider.addEventListener('input', function() {
        document.getElementById('vol-label').textContent = `(${this.value}%)`;
        updateDialGraphic('vol-slider', 'vol-pointer', -140, 140, 0, 100);
    });

    const velSlider = document.getElementById('vel-slider');
    velSlider.addEventListener('input', function() {
        document.getElementById('vel-label').textContent = `(${this.value})`;
        updateDialGraphic('vel-slider', 'vel-pointer', -140, 140, 0, 127);
    });

    const tempoSlider = document.getElementById('tempo-slider');
    tempoSlider.addEventListener('input', function() {
        document.getElementById('tempo-label').textContent = `(${this.value} BPM)`;
        updateDialGraphic('tempo-slider', 'tempo-pointer', -140, 140, 40, 240);
    });

    updateDialGraphic('vol-slider', 'vol-pointer', -140, 140, 0, 100);
    updateDialGraphic('vel-slider', 'vel-pointer', -140, 140, 0, 127);
    updateDialGraphic('tempo-slider', 'tempo-pointer', -140, 140, 40, 240);

    // --- Main Sequence Playback Engine ---
    function playSequence() {
        if (!isSequencerPlaying) return;

        const rawInput = document.getElementById('tone-row-input').value;
        if (!rawInput.trim()) {
            stopSequencer();
            return;
        }

        let liveArray = rawInput.split(',').map(Number).filter(v => !isNaN(v));
        if (liveArray.length === 0) return;

        if (currentStepIndex >= liveArray.length) {
            if (document.getElementById('stop-end-phrase').checked) {
                stopSequencer();
                return;
            }
            currentStepIndex = 0;
        }

        let remaining = liveArray.length - currentStepIndex;
        document.getElementById('countdown-display').textContent = remaining >= 0 ? remaining : 0;

        const timeSig = document.getElementById('time-sig-select').value;
        let beatsPerMeasure = 4;
        if (timeSig === '3-4') beatsPerMeasure = 3;
        if (timeSig === '2-4') beatsPerMeasure = 2;
        if (timeSig === '6-8') beatsPerMeasure = 6;

        let currentBeat = (currentStepIndex % beatsPerMeasure) + 1;
        const bBox = document.getElementById('beat-box-element');
        bBox.textContent = currentBeat;

        if (currentBeat === 1) {
            bBox.classList.add('beat-flash-green');
        } else {
            bBox.classList.remove('beat-flash-green');
        }

        let currentBpm = parseInt(tempoSlider.value) || 120;
        let stepDuration = 60 / currentBpm;

        // --- Rhythm Modes behavior ---
        const rhythmMode = document.getElementById('rhythm-select').value;
        if (rhythmMode === 'dotted') {
            stepDuration = (currentStepIndex % 2 === 0) ? stepDuration * 1.5 : stepDuration * 0.5;
        } else if (rhythmMode === 'random-fluid') {
            stepDuration = stepDuration * (Math.random() * 1.5 + 0.25);
        } else if (rhythmMode === 'durations') {
            stepDuration = stepDuration * (Math.floor(Math.random() * 4) + 1) * 0.5;
        } else if (rhythmMode === 'interleaved' && currentStepIndex % 2 === 1) {
            currentStepIndex++;
            sequencerTimer = setTimeout(playSequence, stepDuration * 1000);
            return;
        }

        let currentVol = parseInt(volSlider.value) || 0;
        let currentVel = velSlider.value !== "" ? parseInt(velSlider.value) : 100;

        if (document.getElementById('random-accent-chk').checked) {
            currentVel = Math.min(127, Math.max(20, currentVel + (Math.floor(Math.random() * 41) - 20)));
        }

        const noteNumber = liveArray[currentStepIndex];
        playNote(noteNumber, stepDuration, currentVel, currentVol);

        currentStepIndex++;
        sequencerTimer = setTimeout(playSequence, stepDuration * 1000);
    }

    // --- Stop Playback Engine ---
    function stopSequencer() {
        isSequencerPlaying = false;
        document.getElementById('play-pause-btn').textContent = "Play";
        const bBox = document.getElementById('beat-box-element');
        bBox.classList.remove('beat-flash-green');
        clearTimeout(sequencerTimer);
    }

    // --- Control Button Listeners ---
    document.getElementById('play-pause-btn').addEventListener('click', function() {
        isSequencerPlaying = !isSequencerPlaying;

    document.getElementById('retro-inversion-btn').addEventListener('click', function() {

        document.getElementById('output-display').textContent = result.join(', ');

            baseRow.push(Math.floor(Math.random() * 12));
        }
        document.getElementById('tone-row-input').value = baseRow.join(', ');

    document.getElementById('reset-btn').addEventListener('click', function() {
        stopSequencer();
        currentStepIndex = 0;
        document.getElementById('tone-row-input').value = "";
        document.getElementById('output-display').textContent = "(Transformed sequence will appear here)";
        const targetLength = document.getElementById('row-length-input').value;
        document.getElementById('countdown-display').textContent = targetLength;
        const bBox = document.getElementById('beat-box-element');

            bBox.classList.remove('beat-flash-green');

document.getElementById('save-preset-btn').addEventListener('click', () => {
    const rawInput = document.getElementById('tone-row-input').value;
    localStorage.setItem('genoras_stored_row', rawInput);
    alert('Tone Row successfully saved to memory!');
});
document.getElementById('load-preset-btn').addEventListener('click', () => {
    const savedRow = localStorage.getItem('genoras_stored_row');

        return;

    document.getElementById('tone-row-input').value = savedRow;

// --- MIDI Writer File Export Logic ---
document.getElementById('exportMidiBtn').addEventListener('click', function() {
    const rawInput = document.getElementById('tone-row-input').value;
    if (!rawInput.trim()) {
        alert("Please create or enter a tone row first!");
        return;
    }

    let notesArray = rawInput.split(',').map(Number).filter(v => !isNaN(v));
    let track = new MidiWriter.Track();

    const currentBpm = parseInt(document.getElementById('tempo-slider').value) || 120;
    track.setTempo(currentBpm);

    const midiMapping = [60, 61, 62, 63, 64, 65, 66, 67, 68, 69, 70, 71];
    const isRandomVelocity = document.getElementById('random-accent-chk').checked;

    notesArray.forEach(function(noteNum) {
        let midiPitch = midiMapping[noteNum % 12];
        let velocityValue = isRandomVelocity ? Math.floor(Math.random() * (120 - 60 + 1)) + 60 : 90;
        const chosenDuration = document.getElementById('note-duration-select').value;
        track.addEvent(new MidiWriter.NoteEvent({pitch: [midiPitch], duration: chosenDuration, velocity: velocityValue}));
    });

    let write = new MidiWriter.Writer(track);
    let link = document.createElement('a');
    link.href = write.dataUri();
    link.download = 'serial-music-row.mid';
    link.click();
    });

function generateMatrix(row) {
    const grid = document.getElementById('matrix-grid');
    grid.style.display = 'none';
    grid.innerHTML = ''; // Clear any old matrix
    
    if (!row || row.length === 0) return;
    
    // Set up a 12-column grid layout
    grid.style.gridTemplateColumns = `repeat(${row.length}, 40px)`;
    
    // Calculate the inversion intervals based on the first note
    const firstNote = row[0];
    const inversionRow = row.map(note => (firstNote - (note - firstNote) % 12 + 12) % 12);
    
    // Build the 12x12 matrix rows
    for (let r = 0; r < row.length; r++) {
        const rowFirstNote = inversionRow[r];
        const shift = (rowFirstNote - firstNote + 12) % 12;
        
        for (let c = 0; c < row.length; c++) {
    
    
            const matrixNote = (row[c] + shift) % 12;
            
            // Create a visual square for each note
            const cell = document.createElement('div');
            cell.textContent = matrixNote;
            cell.style.width = '40px';
            cell.style.height = '40px';
            cell.style.display = 'flex';
            cell.style.alignItems = 'center';
            cell.style.justifyContent = 'center';
            cell.style.backgroundColor = '#fff';
            cell.style.color = '#000';
            cell.style.fontWeight = 'bold';
            cell.style.borderRadius = '4px';
            
            grid.appendChild(cell);
        }
    }
}
